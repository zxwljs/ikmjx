<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>买家秀随机展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-brand:hover {
            color: #667eea;
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .nav-toggle:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-toggle span {
            width: 25px;
            height: 3px;
            background: #333;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .nav-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .nav-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .nav-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -6px);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-link {
            padding: 10px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .nav-dropdown {
            position: relative;
        }

        .nav-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-width: 200px;
            padding: 10px 0;
            margin-top: 10px;
        }

        .nav-dropdown.active .nav-dropdown-content {
            display: block;
        }

        .nav-dropdown-item {
            display: block;
            padding: 12px 20px;
            color: #333;
            text-decoration: none;
            transition: background 0.3s ease;
        }

        .nav-dropdown-item:hover {
            background: #f8f9fa;
        }

        .nav-dropdown-item span {
            margin-right: 8px;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .image-card {
            background: #f8f9fa;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .image-card img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .placeholder {
            color: #999;
            font-size: 18px;
        }

        .random-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .random-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .random-btn:active {
            transform: translateY(0);
        }

        .random-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .image-counter {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .disclaimer {
            margin: 0 20px 30px 20px;
            padding: 15px;
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
            line-height: 1.6;
        }

        .disclaimer strong {
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px 10px;
            }

            .container {
                padding: 30px 20px;
            }

            .nav-toggle {
                display: flex;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 20px;
                gap: 10px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-dropdown-content {
                position: static;
                box-shadow: none;
                padding-left: 20px;
                background: #f8f9fa;
                margin-top: 10px;
            }

            .nav-dropdown.active .nav-dropdown-content {
                display: block;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-brand">📸 买家秀图库</a>
        
        <div class="nav-toggle" id="nav-toggle" onclick="toggleNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="nav-links">
            <a href="index.html" class="nav-link">🏠 图库</a>
            <a href="random.html" class="nav-link">🎲 随机</a>
            
            <div class="nav-dropdown" id="nav-dropdown">
                <a href="#" class="nav-link" onclick="toggleDropdown(event)">☰ 更多 ▼</a>
                <div class="nav-dropdown-content">
                    <a href="#" class="nav-dropdown-item"><span>📌</span>页面1（待开发）</a>
                    <a href="#" class="nav-dropdown-item"><span>📌</span>页面2（待开发）</a>
                    <a href="#" class="nav-dropdown-item"><span>📌</span>页面3（待开发）</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <h1>📸 买家秀随机展示</h1>
            
            <div class="image-card">
                <img id="showcase-image" src="" alt="买家秀" style="display: none;">
                <div id="placeholder" class="placeholder">点击按钮随机展示图片</div>
            </div>

            <button class="random-btn" onclick="showRandomImage()">🎲 随机展示</button>
            
            <div class="image-counter" id="image-counter"></div>
        </div>
    </div>

    <div class="disclaimer">
        <strong>⚠️ 免责声明</strong>
        本站展示的图片均来源于互联网，仅供学习交流使用。我们不拥有这些图片的版权，所有版权归原作者所有。如有侵权，请联系我们删除。
    </div>

    <script>
        const IMAGE_COUNT = 369;
        const IMAGE_FOLDER = 'src';
        
        function generateImageList() {
            const images = [];
            for (let i = 1; i <= IMAGE_COUNT; i++) {
                images.push(`${IMAGE_FOLDER}/api.1ove.icu (${i}).jpg`);
            }
            return images;
        }

        const images = generateImageList();
        let currentIndex = -1;

        function showRandomImage() {
            if (images.length === 0) {
                alert('请先添加图片！');
                return;
            }

            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * images.length);
            } while (newIndex === currentIndex && images.length > 1);

            currentIndex = newIndex;

            const imgElement = document.getElementById('showcase-image');
            const placeholder = document.getElementById('placeholder');
            const counter = document.getElementById('image-counter');
            const btn = document.querySelector('.random-btn');

            btn.disabled = true;
            placeholder.textContent = '加载中...';

            const tempImg = new Image();
            tempImg.onload = function() {
                imgElement.src = images[currentIndex];
                imgElement.style.display = 'block';
                placeholder.style.display = 'none';
                counter.textContent = `图片 ${currentIndex + 1} / ${images.length}`;
                btn.disabled = false;
            };
            tempImg.onerror = function() {
                placeholder.textContent = '图片加载失败';
                btn.disabled = false;
                console.error('加载失败的图片:', images[currentIndex]);
            };
            tempImg.src = images[currentIndex];
        }

        window.onload = function() {
            showRandomImage();
        };

        function toggleNav() {
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.getElementById('nav-links');
            navToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        }

        function toggleDropdown(event) {
            event.preventDefault();
            event.stopPropagation();
            const dropdown = document.getElementById('nav-dropdown');
            dropdown.classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('nav-dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });
    </script>
</body>
</html>
