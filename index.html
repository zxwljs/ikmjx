<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>随机图片展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }
        .card-header {
            padding: 24px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .card-header h1 { font-size: 24px; color: #333; font-weight: 600; margin-bottom: 8px; }
        .card-header p { font-size: 14px; color: #888; }
        .image-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #f5f5f5;
            overflow: hidden;
        }
        .image-container img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }
        .image-info {
            padding: 16px 24px;
            text-align: center;
            background: #fafafa;
        }
        .image-info span { font-size: 13px; color: #666; }
        .card-footer {
            padding: 24px;
            display: flex;
            justify-content: center;
        }
        .btn-random {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-random:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
        .btn-random:active { transform: translateY(0); }
        .btn-random.loading { opacity: 0.7; pointer-events: none; }
        .stats {
            margin-top: 24px;
            padding: 16px 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            text-align: center;
            font-size: 14px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);} }
        .shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>🎴 随机图片</h1>
            <p>点击按钮随机展示图片</p>
        </div>
        <div class="image-container" id="imgContainer">
            <img id="randomImg" src="" alt="加载中...">
        </div>
        <div class="image-info">
            <span id="imgIndex">图片 0 / 0</span>
        </div>
        <div class="card-footer">
            <button class="btn-random" id="randomBtn" onclick="showRandom()">🎲 随机刷新</button>
        </div>
    </div>
    <div class="stats">已浏览: <span id="viewCount">0</span> 张</div>

    <script>
        const images = [];
        for(let i=1; i<=368; i++) {
            images.push(`src/api.1ove.icu (${i}).jpg`);
        }
        let viewCount = 0;
        const imgEl = document.getElementById('randomImg');
        const indexEl = document.getElementById('imgIndex');
        const countEl = document.getElementById('viewCount');
        const btn = document.getElementById('randomBtn');
        const container = document.getElementById('imgContainer');

        function showRandom() {
            btn.classList.add('loading');
            container.classList.add('shake');
            
            setTimeout(() => {
                const idx = Math.floor(Math.random() * images.length);
                imgEl.src = images[idx];
                viewCount++;
                indexEl.textContent = `图片 ${idx+1} / ${images.length}`;
                countEl.textContent = viewCount;
                
                btn.classList.remove('loading');
                container.classList.remove('shake');
            }, 300);
        }
        
        showRandom();
    </script>
</body>
</html>
